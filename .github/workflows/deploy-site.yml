name: Deploy Site Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'Tools/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SFTP
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cd Tools
          find . -type f \
            ! -path './.git*' \
            ! -name '*.py' \
            ! -name '*.xlsx' \
            ! -path './hostinger_backend/*' \
            ! -path './screenshots/*' \
            ! -name 'itch_cover*' \
            ! -name 'gen_cover*' \
            | sort > /tmp/filelist.txt

          echo "Files to upload:"
          cat /tmp/filelist.txt

          while IFS= read -r filepath; do
            rel=$(echo "$filepath" | sed 's|^\./||')
            dir=$(dirname "$rel")
            echo "Uploading: $rel"
            sshpass -p "$FTP_PASSWORD" ssh -o StrictHostKeyChecking=no \
              "$FTP_USERNAME@$FTP_SERVER" "mkdir -p public_html/$dir" 2>/dev/null || true
            sshpass -p "$FTP_PASSWORD" scp -o StrictHostKeyChecking=no \
              "$filepath" "$FTP_USERNAME@$FTP_SERVER:public_html/$rel" \
              && echo "OK: $rel" \
              || echo "FAILED: $rel"
          done < /tmp/filelist.txt

          echo "Deploy finished."

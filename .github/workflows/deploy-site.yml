name: Deploy Site → Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'Tools/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP (curl)
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          ERRORS=0
          cd Tools
          while IFS= read -r filepath; do
            rel="${filepath#./}"
            remote="ftp://${FTP_SERVER}/public_html/${rel}"
            echo "↑ $rel"
            curl --silent --show-error \
              -T "$filepath" \
              "$remote" \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              --ftp-pasv \
              --ftp-create-dirs \
              --ftp-ssl-control \
              --insecure \
              --retry 3 \
              --retry-delay 5 \
              --max-time 60 \
              || curl --silent --show-error \
                -T "$filepath" \
                "$remote" \
                --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
                --ftp-pasv \
                --ftp-create-dirs \
                --retry 3 \
                --retry-delay 5 \
                --max-time 60 \
              || { echo "❌ FAILED: $rel"; ERRORS=$((ERRORS+1)); }
          done < <(find . -type f \
            ! -path './.git*' \
            ! -name '*.py' \
            ! -name '*.xlsx' \
            ! -path './hostinger_backend/*' \
            ! -path './screenshots/*' \
            ! -name 'itch_cover*' \
            ! -name 'gen_cover*' \
            | sort)
          echo "Done. Errors: $ERRORS"
          [ "$ERRORS" -eq 0 ] || exit 1

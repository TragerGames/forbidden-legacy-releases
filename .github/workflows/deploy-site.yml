name: Deploy Site Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'Tools/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cd Tools
          ERRORS=0
          for filepath in $(find . -type f \
            ! -path './.git*' \
            ! -name '*.py' \
            ! -name '*.xlsx' \
            ! -path './hostinger_backend/*' \
            ! -path './screenshots/*' \
            ! -name 'itch_cover*' \
            ! -name 'gen_cover*' \
            | sort); do
            rel=$(echo "$filepath" | sed 's|^\./||')
            remote="ftp://${FTP_SERVER}/public_html/${rel}"
            echo "Uploading: $rel"
            curl --silent --show-error \
              -T "$filepath" "$remote" \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              --ftp-pasv \
              --ftp-create-dirs \
              --retry 3 \
              --retry-delay 5 \
              --max-time 60 \
              && echo "OK: $rel" \
              || { echo "FAILED: $rel"; ERRORS=$((ERRORS+1)); }
          done
          echo "Upload finished. Errors: $ERRORS"
          [ "$ERRORS" -eq 0 ] || exit 1

name: Deploy Site Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'Tools/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test connectivity
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "=== Testing ports on $FTP_SERVER ==="
          for port in 21 22 990 2121; do
            timeout 8 bash -c "echo > /dev/tcp/$FTP_SERVER/$port" \
              && echo "PORT $port: OPEN" \
              || echo "PORT $port: BLOCKED"
          done

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          printf '%s\n' \
            "set ftp:ssl-allow no" \
            "set ftp:passive-mode yes" \
            "set ftp:use-mlsd no" \
            "set net:timeout 30" \
            "set net:max-retries 3" \
            "open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER}" \
            "mirror --reverse --verbose --ignore-time --exclude-glob .git --exclude-glob *.py --exclude-glob *.xlsx --exclude-glob hostinger_backend/ --exclude-glob screenshots/ --exclude-glob itch_cover* --exclude-glob gen_cover* ./Tools/ /public_html/" \
            > /tmp/lftp.txt
          # HTML pages podem ter o mesmo tamanho em bytes de uma edicao pra outra
          # (ex.: troca de versao "1.7.3" -> "1.7.4", mesmo numero de caracteres).
          # O mirror acima usa --ignore-time (compara so por tamanho) e SILENCIOSAMENTE
          # pula esses arquivos achando que estao iguais. Forcar put de todo *.html de
          # topo garante que a pagina sempre vai pro ar, mesmo sem mudanca de tamanho.
          for f in Tools/*.html; do
            printf 'put -O /public_html "%s"\n' "$f" >> /tmp/lftp.txt
          done
          printf '%s\n' "quit" >> /tmp/lftp.txt
          lftp -f /tmp/lftp.txt

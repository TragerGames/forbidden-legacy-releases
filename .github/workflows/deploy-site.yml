name: Deploy Site Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'Tools/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          printf '%s\n' \
            "set sftp:auto-confirm yes" \
            "set net:timeout 60" \
            "set net:max-retries 3" \
            "open sftp://${FTP_USERNAME}:${FTP_PASSWORD}@${FTP_SERVER}" \
            "mirror --reverse --delete --verbose --exclude-glob .git --exclude-glob *.py --exclude-glob *.xlsx --exclude-glob hostinger_backend/ --exclude-glob screenshots/ --exclude-glob itch_cover* --exclude-glob gen_cover* ./Tools/ /public_html/" \
            "quit" > /tmp/lftp.txt
          lftp -f /tmp/lftp.txt

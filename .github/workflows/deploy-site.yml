name: Deploy Site → Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'Tools/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp)
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/lftp_script.txt << 'EOF'
set ftp:ssl-allow no
set ftp:passive-mode yes
set ftp:use-mlsd no
set net:timeout 120
set net:max-retries 8
set net:reconnect-interval-base 10
set net:reconnect-interval-multiplier 1.5
EOF
          echo "open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER" >> /tmp/lftp_script.txt
          cat >> /tmp/lftp_script.txt << 'EOF'
mirror --reverse --delete --verbose \
  --exclude-glob .git* \
  --exclude-glob *.py \
  --exclude-glob *.xlsx \
  --exclude-glob hostinger_backend/ \
  --exclude-glob screenshots/ \
  --exclude-glob itch_cover* \
  --exclude-glob gen_cover* \
  ./Tools/ /public_html/
quit
EOF
          lftp -f /tmp/lftp_script.txt
